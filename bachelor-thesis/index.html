<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Milena Kowalska — full-stack developer exploring AI systems, LLM engineering and thoughtful software."
  />

  <title>Milena Kowalska</title>
  <link rel="icon" type="image/png" href="./favicon.png" />

  <style>
    :root {
      --background: #f8efd4;
      --text: #4f3d16;
      --accent: #c49a2c;
      --muted: #7b6a48;
      --border: rgba(79, 61, 22, 0.16);
      --card: rgba(255, 255, 255, 0.32);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--background);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.6;
    }

    main {
      flex: 1;
      width: min(100% - 2rem, 760px);
      margin: 0 auto;
      padding: 1rem 0;
      text-align: center;
    }


    h1, h2, p {
      margin-top: 0;
    }


    footer {
      width: min(100% - 2rem, 760px);
      margin: 0 auto;
      padding: 1.5rem 0 2rem;
      border-top: 1px solid var(--border);
    }

    .links {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem 1.5rem;
      flex-wrap: wrap;
    }

    .links a {
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
    }

    .links a:hover,
    .links a:focus-visible {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 0.25em;
    }

    a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 4px;
      border-radius: 4px;
    }

    .back {
      display: inline-block;
      margin-top: 1rem;
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }

    .back:hover,
    .back:focus-visible {
      text-decoration: underline;
      text-underline-offset: 0.25em;
    }
  </style>
</head>

<body>
  <main>
      <a class="back" href="/">
        Back
      </a>
      <p>
        My bachelor thesis TODO
      </p>

  </main>

  <footer>
    <nav class="links" aria-label="Social links">
      <a href="https://www.linkedin.com/in/milena-kowalska-7b30471b1/">LinkedIn</a>
      <a href="https://github.com/milenakowalska">GitHub</a>
      <a href="mailto:milenakowalska126@gmail.com">Email</a>
    </nav>
  </footer>
</body>
</html>
